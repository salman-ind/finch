const GOOGLE_ANDROID_CLIENT_ID = '1038414051325-rirlceiajveevm0p7ah3o0lum0jmpcob.apps.googleusercontent.com';

// Web client secret — needed for token exchange with web client type

const GOOGLE_CLIENT_SECRET = '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';
// e.g. if client ID is '123456789-abcdefgh.apps.googleusercontent.com'
// then REDIRECT_URI = 'com.googleusercontent.apps.123456789-abcdefgh:/oauth2redirect'

const GOOGLE_ANDROID_CLIENT_URI = (()=>{

// ── Emoji as JS unicode escapes (encoding-safe) ───────────────

  entertainment:'\uD83C\uDFAC', house:'\uD83C\uDFE0', transport:'\uD83D\uDE97',
  gifts:'\uD83C\uDF81', clothing:'\uD83D\uDC55', misc:'\uD83D\uDCE6',

};
const CATS = [
  {id:'food',         label:'Food',       color:'#D85A30', bg:'rgba(216,90,48,0.11)'},
  {id:'health',       label:'Health',     color:'#1D9E75', bg:'rgba(29,158,117,0.11)'},
  {id:'utilities',    label:'Utilities',  color:'#378ADD', bg:'rgba(55,138,221,0.11)'},
  {id:'entertainment',label:'Entertain.', color:'#D4537E', bg:'rgba(212,83,126,0.11)'},
  {id:'house',        label:'House',      color:'#BA7517', bg:'rgba(186,117,23,0.11)'},
  {id:'transport',    label:'Transport',  color:'#7F77DD', bg:'rgba(127,119,221,0.11)'},
  {id:'gifts',        label:'Gifts',      color:'#E24B4A', bg:'rgba(226,75,74,0.11)'},
  {id:'clothing',     label:'Clothing',   color:'#639922', bg:'rgba(99,153,34,0.11)'},
  {id:'misc',         label:'Misc',       color:'#888780', bg:'rgba(136,135,128,0.11)'},
];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const mkKey  = d  => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const localToday = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const ls     = { get:k=>{try{return localStorage.getItem(k)}catch(e){return null}}, set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}} };
const getCat = id => CATS.find(c=>c.id===id)||CATS[8];
const esc    = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const mlabel = k  => { const [yr,mo]=k.split('-').map(Number); return `${MONTHS[mo-1]} ${yr}`; };
const em     = id => EM[id]||EM.misc;
const CURRENCIES = [
  {code:'EUR', symbol:'\u20AC', name:'Euro'},
  {code:'USD', symbol:'$',      name:'US Dollar'},
  {code:'GBP', symbol:'\u00A3', name:'British Pound'},
  {code:'JPY', symbol:'\u00A5', name:'Japanese Yen'},
  {code:'CNY', symbol:'\u00A5', name:'Chinese Yuan'},
  {code:'INR', symbol:'\u20B9', name:'Indian Rupee'},
];
let CURRENCY_CODE = ls.get('finch_currency') || 'EUR';
const getCurrency = () => CURRENCIES.find(c=>c.code===CURRENCY_CODE) || CURRENCIES[0];
const fmtAmt = n => getCurrency().symbol + Math.abs(n).toFixed(2);

let DARK = ls.get('finch_dark')==='1';
function applyTheme(){
  document.documentElement.setAttribute('data-theme', DARK?'dark':'light');
  const m=document.getElementById('theme-color-meta');
  if(m) m.content = DARK?'#1c1c1e':'#ffffff';
}
function toggleDark(){

}

// Font scale: 0=Small(90%), 1=Default(100%), 2=Large(112%), 3=XL(125%)
const FONT_STEPS = [
  {label:'Small',   scale:0.90},
  {label:'Default', scale:1.00},
  {label:'Large',   scale:1.12},
];
let FONT_STEP = parseInt(ls.get('finch_font')||'1');
function applyFontScale(){

  document.body.style.zoom = s;
}
function setFontStep(n){

  ls.set('finch_font', String(FONT_STEP));
  applyFontScale();
  render();
}
function setCurrency(code){
  CURRENCY_CODE = code;
  ls.set('finch_currency', code);
  render();
}

let APP   = {budgets:{},transactions:[]};
let SYNC  = {
  token:  ls.get('finch_gd_token')  || '',
  fileId: ls.get('finch_gd_file')   || '',
  expiry: parseInt(ls.get('finch_gd_expiry') || '0'),
  status: 'idle',
  lastSaved: null
};
let STATE = {
  curMonth:mkKey(new Date()),modal:null,
  amount:null,pendingCat:null,noteInput:'',dateInput:localToday(),
  editingId:null,
  viewTx:null,tab:'tx',
  budgetInput:'',calcExpr:'',calcDisp:'0',
  setupError:'',setupLoading:false,dataMsg:'',
};
let trendChart=null;

// ── Google Drive sync ─────────────────────────────────────────────
const DRIVE_API    = 'https://www.googleapis.com/drive/v3';
const DRIVE_UPLOAD = 'https://www.googleapis.com/upload/drive/v3';
const GD_FILE      = 'finch-data.json';
const GD_SCOPE     = 'https://www.googleapis.com/auth/drive.appdata';

// ── PKCE helpers ──────────────────────────────────────────────
function pkceVerifier(){
  const arr = new Uint8Array(64);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
async function pkceChallenge(verifier){
  const data = new TextEncoder().encode(verifier);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

// ── Web path: GIS token client ────────────────────────────────
let tokenClient;

function onGISReady(){
  if(isNative()) return;
  if(typeof google==='undefined') return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GD_SCOPE,
    callback: (resp) => {
      if(resp.error){
        setState({setupLoading:false, setupError:'Sign-in failed: '+(resp.error_description||resp.error)});
        return;
      }
      onTokenReceived(resp.access_token, resp.expires_in);
    },
  });
  if(SYNC.fileId && !(SYNC.token && SYNC.expiry > Date.now())){
    tokenClient.requestAccessToken({prompt:'none'});
  }
}

// ── Shared token handler ──────────────────────────────────────
async function onTokenReceived(accessToken, expiresInSeconds){
  SYNC.token  = accessToken;
  SYNC.expiry = Date.now() + ((expiresInSeconds||3600) - 60) * 1000;
  ls.set('finch_gd_token',  SYNC.token);
  ls.set('finch_gd_expiry', String(SYNC.expiry));

  if(SYNC.fileId){
    SYNC.status = 'synced';
    if(STATE.setupLoading) setState({setupLoading:false, modal:null, setupError:''});
    else render();
    return;
  }

  try{
    let fid = await driveFind();
    if(fid){
      SYNC.fileId = fid; ls.set('finch_gd_file', fid);
      await driveLoad();
    } else {
      fid = await driveCreate();
      SYNC.fileId = fid; ls.set('finch_gd_file', fid);
    }
    SYNC.status = 'synced';
    setState({setupLoading:false, modal:null, setupError:''});
  } catch(err){
    setState({setupLoading:false, setupError:err.message||'Google Drive error.'});
  }
}

// ── Native PKCE via @capacitor/browser + @capacitor/app ───────
// Opens a Chrome Custom Tab (not a WebView — Google allows this).
// Uses the Android OAuth client ID (public client, no secret needed).
async function nativeOAuth2SignIn(){
  const Browser = Capacitor.Plugins.Browser;
  const App     = Capacitor.Plugins.App;
  if(!Browser) throw new Error('Browser plugin not found');
  if(!App)     throw new Error('App plugin not found');

  const verifier   = pkceVerifier();
  const challenge  = await pkceChallenge(verifier);

  const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' + new URLSearchParams({
    client_id:             GOOGLE_CLIENT_ID,
    redirect_uri:          GOOGLE_ANDROID_CLIENT_URI,
    response_type:         'code',
    scope:                 GD_SCOPE,
    code_challenge:        challenge,
    code_challenge_method: 'S256',
    prompt:                'consent',
    access_type:           'online',
  });

  return new Promise(async (resolve, reject) => {
    // Listen for the redirect URL coming back into the app
    const handle = await App.addListener('appUrlOpen', async (event) => {
      (await handle).remove();
      try{
        await Browser.close();
        const url    = new URL(event.url);
        const code   = url.searchParams.get('code');
        const err    = url.searchParams.get('error');
        if(err)   { reject(new Error(err)); return; }
        if(!code) { reject(new Error('No auth code in redirect URL')); return; }

        // Exchange code → token. Android clients are public — no client_secret.
        const resp = await fetch('https://oauth2.googleapis.com/token', {
          method:  'POST',
          headers: {'Content-Type':'application/x-www-form-urlencoded'},
          body:    new URLSearchParams({
            code,
            client_id:     GOOGLE_CLIENT_ID,
            client_secret: GOOGLE_CLIENT_SECRET,
            redirect_uri:  GOOGLE_ANDROID_CLIENT_URI,
            grant_type:    'authorization_code',
            code_verifier: verifier,
          })
        });
        const data = await resp.json();
        if(data.error) { reject(new Error(data.error_description||data.error)); return; }
        resolve({ token: data.access_token, expiresIn: data.expires_in||3600 });
      } catch(e){ reject(e); }
    });

    await Browser.open({ url: authUrl, windowName: '_self' });
  });
}

// ── Main connect entry point ──────────────────────────────────
async function connectGoogle(){
  setState({setupLoading:true, setupError:''});
  if(isNative()){
    try{
      const { token, expiresIn } = await nativeOAuth2SignIn();
      await onTokenReceived(token, expiresIn);
    } catch(err){
      setState({setupLoading:false, setupError:'Sign-in failed: '+(err.message||String(err))});
    }
    return;
  }
  if(!tokenClient){
    setState({setupLoading:false, setupError:'Google Sign-In not ready — try again in a moment.'});
    return;
  }
  tokenClient.requestAccessToken({prompt:'consent'});
}

async function reconnectGoogle(){
  if(isNative()){
    try{
      const { token, expiresIn } = await nativeOAuth2SignIn();
      await onTokenReceived(token, expiresIn);
    } catch(e){ render(); }
    return;
  }
  if(tokenClient) tokenClient.requestAccessToken({prompt:'none'});
}

async function disconnectGoogle(){
  if(SYNC.token){
    try{ await fetch(`https://oauth2.googleapis.com/revoke?token=${SYNC.token}`,{method:'POST'}); }catch(e){}
  }
  ls.set('finch_gd_token',''); ls.set('finch_gd_file',''); ls.set('finch_gd_expiry','');
  SYNC.token=''; SYNC.fileId=''; SYNC.expiry=0; SYNC.status='idle';
  setState({modal:'data', dataMsg:'Disconnected from Google Drive.'});
}

// ── Drive REST helpers ────────────────────────────────────────
async function driveFind(){
  const r = await fetch(
    `${DRIVE_API}/files?spaces=appDataFolder&q=name%3D'${GD_FILE}'&fields=files(id,name)`,
    {headers:{Authorization:`Bearer ${SYNC.token}`}}
  );
  if(!r.ok) throw new Error('Drive search failed ('+r.status+').');
  const d = await r.json();
  return d.files?.[0]?.id || null;
}

async function driveCreate(){
  const meta     = JSON.stringify({name:GD_FILE, parents:['appDataFolder']});
  const content  = JSON.stringify(APP);
  const boundary = 'finch_mp_boundary';
  const body     = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${boundary}--`;
  const r = await fetch(`${DRIVE_UPLOAD}/files?uploadType=multipart&fields=id`, {
    method:'POST',
    headers:{Authorization:`Bearer ${SYNC.token}`, 'Content-Type':`multipart/related; boundary=${boundary}`},
    body
  });
  if(!r.ok) throw new Error('Failed to create Drive file ('+r.status+').');
  return (await r.json()).id;
}

async function driveLoad(){
  const r = await fetch(`${DRIVE_API}/files/${SYNC.fileId}?alt=media`, {
    headers:{Authorization:`Bearer ${SYNC.token}`}
  });
  if(!r.ok) throw new Error('Failed to load from Drive ('+r.status+').');
  const raw = await r.json();
  if(raw && Array.isArray(raw.transactions)){
    APP = raw;
    try{ls.set('finch_v2', JSON.stringify(APP));}catch(e){}
  }
}

async function driveSave(){
  SYNC.status='syncing'; updateSyncDot();
  try{
    const r = await fetch(`${DRIVE_UPLOAD}/files/${SYNC.fileId}?uploadType=media`, {
      method:'PATCH',
      headers:{Authorization:`Bearer ${SYNC.token}`, 'Content-Type':'application/json'},
      body: JSON.stringify(APP)
    });
    if(!r.ok) throw new Error('Save failed ('+r.status+').');
    SYNC.status='synced'; SYNC.lastSaved=new Date();
  }catch(e){ SYNC.status='error'; }
  updateSyncDot();
}

async function forceSync(){
  if(!SYNC.fileId){setState({dataMsg:'Not connected.'});return;}
  if(!SYNC.token||SYNC.expiry<=Date.now()){setState({dataMsg:'Session expired — tap Reconnect.'});return;}
  setState({dataMsg:'Syncing\u2026'}); await driveSave();
  setState({dataMsg:'Synced!'}); setTimeout(()=>setState({dataMsg:''}),2000);
}

// ── Sync dot ──────────────────────────────────────────────────
function updateSyncDot(){
  const el=document.getElementById('sync-row'); if(!el) return;
  if(SYNC.status==='syncing') el.innerHTML=`<span class="sync-dot syncing" style="background:#BA7517"></span><span style="font-size:12px;color:var(--text2)">Syncing&hellip;</span>`;
  else if(SYNC.status==='synced') el.innerHTML=`<span class="sync-dot" style="background:#1D9E75"></span><span style="font-size:12px;color:var(--text2)">Saved to Drive</span>`;
  else if(SYNC.status==='error') el.innerHTML=`<span class="sync-dot" style="background:#E24B4A"></span><span style="font-size:12px;color:var(--danger)">Sync failed</span>`;
}

// ── Export / Import ───────────────────────────────────────────
function exportBackup(){
  try{
    const b=new Blob([JSON.stringify(APP,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');
    a.href=u; a.download='finch-backup.json';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(u);
  }catch(e){alert('Export failed.');}
}
function triggerImport(){
  const el=document.getElementById('imp-file'); if(el) el.click();
}
function handleImport(input){
  if(!input.files||!input.files[0]) return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data&&Array.isArray(data.transactions)&&typeof data.budgets==='object'){
        APP=data; await saveData();
        setState({modal:'data',dataMsg:'Import successful! '+data.transactions.length+' transactions loaded.'});
      }else{alert('Invalid backup file.');}
    }catch(ex){alert('Failed to read file — make sure it is a valid Finch JSON backup.');}
  };
  reader.readAsText(input.files[0]);
}

async function saveData(){
  try{ls.set('finch_v2',JSON.stringify(APP));}catch(e){}
  if(SYNC.token && SYNC.fileId && SYNC.expiry > Date.now()) driveSave();
}

// ── State helpers ─────────────────────────────────────────────
function setState(p){Object.assign(STATE,p);render();}
function startEdit(id){
  const tx=APP.transactions.find(t=>t.id===id);
  if(!tx) return;
  setState({
    editingId:id, modal:'calc',
    amount:tx.amount, calcExpr:String(tx.amount), calcDisp:String(tx.amount),
    pendingCat:tx.category, noteInput:tx.note||'', dateInput:tx.date,
    viewTx:null,
  });
}
function closeModal(){setState({modal:null,viewTx:null,pendingCat:null,noteInput:'',dateInput:localToday(),editingId:null,dataMsg:''});}

function calcPress(v){
  const ops=['+','-','*','/'];let e=STATE.calcExpr;
  let ne=e,nd=STATE.calcDisp;
  if(v==='C'){ne='';nd='0';}
  else if(v==='DEL'){ne=e.slice(0,-1);nd=ne||'0';}
  else if(v==='='){
    try{const r=Function('"use strict";return('+e+')')();if(!isNaN(r)&&isFinite(r)){const rv=Math.round(r*100)/100;ne=String(rv);nd=String(rv);}}catch(ex){}
  } else if(ops.includes(v)){
    if(!e) return; ne=ops.includes(e.slice(-1))?e.slice(0,-1)+v:e+v; nd=ne;
  } else {
    if(v==='.'){const pts=e.split(/[+\-*/]/);if(pts[pts.length-1].includes('.')) return;}
    ne=e+v; nd=ne;
  }
  STATE.calcExpr=ne; STATE.calcDisp=nd;
  const el=document.getElementById('calc-disp');
  if(el) el.textContent=nd;
}
function calcOk(){
  let v; try{v=Function('"use strict";return('+STATE.calcExpr+')')();}catch(ex){v=parseFloat(STATE.calcDisp);}
  if(!isNaN(v)&&isFinite(v)&&v>0) setState({amount:Math.round(v*100)/100,modal:'cat',calcExpr:'',calcDisp:'0'});
}
function pickCat(id){setState({pendingCat:id,modal:'notes',noteInput:''});}
async function addTx(){
  const d=new Date(STATE.dateInput+'T12:00');
  const monthKey=mkKey(d);
  if(STATE.editingId){
    const idx=APP.transactions.findIndex(t=>t.id===STATE.editingId);
    if(idx!==-1){
      APP.transactions[idx]={...APP.transactions[idx],amount:STATE.amount,category:STATE.pendingCat,date:STATE.dateInput,month:monthKey,note:STATE.noteInput.trim()};
    }
  } else {
    APP.transactions.push({id:String(Date.now()),amount:STATE.amount,category:STATE.pendingCat,date:STATE.dateInput,month:monthKey,ts:Date.now(),note:STATE.noteInput.trim()});
  }
  await saveData(); setState({modal:null,amount:null,pendingCat:null,noteInput:'',dateInput:localToday(),editingId:null,curMonth:monthKey,tab:'tx'});
}
async function delTx(id){
  APP.transactions=APP.transactions.filter(t=>t.id!==id);
  await saveData(); setState({modal:null,viewTx:null});
}
async function setBudget(){
  const v=parseFloat(STATE.budgetInput); if(isNaN(v)||v<=0) return;
  APP.budgets[STATE.curMonth]=v; await saveData(); setState({modal:null,budgetInput:''});
}
function navMonth(d){const[yr,mo]=STATE.curMonth.split('-').map(Number);setState({curMonth:mkKey(new Date(yr,mo-1+d,1)),tab:'tx'});}
function goToMonth(k){setState({curMonth:k,tab:'tx',modal:null});}
function getAllMonths(){const s=new Set();(APP.transactions||[]).forEach(t=>s.add(t.month));Object.keys(APP.budgets||{}).forEach(k=>s.add(k));return Array.from(s).sort().reverse();}

  <div style="border-top:0.5px solid var(--border);margin:10px 0 14px"></div>
  <div style="font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Local backup</div>
  <button onclick="exportBackup()" style="width:100%;padding:12px;border-radius:10px;border:0.5px solid var(--border2);background:none;font-size:16px;color:var(--text);margin-bottom:8px">&darr; Export backup (JSON)</button>
  <input type="file" id="imp-file" accept=".json" style="display:none" onchange="handleImport(this)">
  <button onclick="triggerImport()" style="width:100%;padding:12px;border-radius:10px;border:0.5px solid var(--border2);background:none;font-size:16px;color:var(--text);margin-bottom:8px">&uarr; Import from backup</button>
  <button onclick="closeModal()" style="width:100%;padding:10px;background:none;border:none;color:var(--text3);font-size:15px;font-family:inherit">Done</button>`;}

// ── Tabs ──────────────────────────────────────────────────────
function tTx(txs){
  if(!txs.length) return`<div style="text-align:center;padding:64px 20px;color:var(--text3)">
    <div style="font-size:44px;margin-bottom:12px;opacity:0.28">${EM.receipt}</div>
    <p class="serif" style="font-size:20px;font-weight:300;margin-bottom:5px">No transactions yet</p>
    <p style="font-size:15px">Tap + to add your first expense</p>
  </div>`;
  let html='',prev='';
  txs.forEach(tx=>{
    const cat=getCat(tx.category);
    if(tx.date!==prev){
      const ds=new Date(tx.date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
      html+=`<div style="font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;padding:14px 0 5px;font-weight:500">${ds}</div>`;
      prev=tx.date;
    }
    html+=`<div class="tx-row" onclick="STATE.viewTx=APP.transactions.find(t=>t.id==='${tx.id}');setState({modal:'view'})">
      <div style="width:42px;height:42px;border-radius:10px;background:${cat.bg};display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${em(cat.id)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:16px;font-weight:500">${cat.label}</div>
        ${tx.note?`<div style="font-size:13px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(tx.note)}</div>`:''}
      </div>
      <div class="serif" style="font-size:19px;font-weight:300;flex-shrink:0">&minus;${fmtAmt(tx.amount)}</div>
    </div>`;
  });
  return html;
}

function tChart(txs){
  const spent=txs.reduce((s,t)=>s+t.amount,0);
  const ct={};txs.forEach(t=>{ct[t.category]=(ct[t.category]||0)+t.amount;});
  const bd=CATS.filter(c=>ct[c.id]).map(c=>({...c,val:ct[c.id],pct:spent>0?ct[c.id]/spent*100:0})).sort((a,b)=>b.val-a.val);
  if(!bd.length) return`<div style="text-align:center;padding:64px 20px;color:var(--text3)"><p class="serif" style="font-size:20px;font-weight:300">No data yet</p></div>`;
  return`<div style="padding-top:16px">
    ${bd.map(c=>`<div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:19px">${em(c.id)}</span><span style="font-size:15px;font-weight:500">${c.label}</span></div>
        <div><span class="serif" style="font-size:17px;font-weight:300">${fmtAmt(c.val)}</span><span style="font-size:13px;color:var(--text3);margin-left:4px">${c.pct.toFixed(0)}%</span></div>
      </div>
      <div style="background:var(--bg2);border-radius:999px;height:7px;overflow:hidden">
        <div class="bar-fill" style="height:100%;border-radius:999px;width:${c.pct.toFixed(1)}%;background:${c.color}"></div>
      </div>
    </div>`).join('')}
    <div style="margin-top:10px;padding:13px 15px;background:var(--bg2);border-radius:10px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:15px;color:var(--text2)">Total this month</span>
      <span class="serif" style="font-size:20px;font-weight:300">${fmtAmt(spent)}</span>
    </div>
  </div>`;}

function tHistory(){
  const all=getAllMonths();
  if(!all.length) return`<div style="text-align:center;padding:64px 20px;color:var(--text3)"><p class="serif" style="font-size:20px;font-weight:300">No history yet</p></div>`;
  return`<div style="padding-top:16px">${all.map(mk=>{
    const txs=(APP.transactions||[]).filter(t=>t.month===mk);
    const spent=txs.reduce((s,t)=>s+t.amount,0);
    const budget=(APP.budgets||{})[mk]||0;
    const pct=budget>0?Math.min(100,spent/budget*100):0;
    const isCur=mk===STATE.curMonth;
    const bc=budget>0&&spent>budget?'#E24B4A':pct>80?'#BA7517':'#1D9E75';
    return`<div class="hist-card" onclick="goToMonth('${mk}')" style="${isCur?'border:0.5px solid var(--border2);':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${budget?'10px':'0'}">
        <div>
          <div style="font-size:16px;font-weight:500">${mlabel(mk)}${isCur?` <span style="font-size:12px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:99px">now</span>`:''}</div>
          <div style="font-size:13px;color:var(--text3);margin-top:2px">${txs.length} transaction${txs.length!==1?'s':''}</div>
        </div>
        <div style="text-align:right">
          <div class="serif" style="font-size:20px;font-weight:300">${fmtAmt(spent)}</div>
          ${budget?`<div style="font-size:13px;color:var(--text3)">of ${fmtAmt(budget)}</div>`:''}
        </div>
      </div>
      ${budget?`<div style="background:var(--border);border-radius:999px;height:4px;overflow:hidden"><div style="height:100%;border-radius:999px;width:${pct.toFixed(1)}%;background:${bc}"></div></div>`:''}
    </div>`;
  }).join('')}</div>`;}

function tTrends(){return`<div style="padding-top:16px"><canvas id="trend-c"></canvas><div id="trend-leg" style="margin-top:14px"></div></div>`;}
function initTrend(){
  const cv=document.getElementById('trend-c');
  if(!cv||typeof Chart==='undefined') return;
  if(trendChart){try{trendChart.destroy();}catch(e){}trendChart=null;}
  const months=(()=>{const r=[],n=new Date();for(let i=5;i>=0;i--)r.push(mkKey(new Date(n.getFullYear(),n.getMonth()-i,1)));return r;})();
  const labels=months.map(mk=>{const[yr,mo]=mk.split('-').map(Number);return MONTHS[mo-1].slice(0,3)+" '"+String(yr).slice(2);});
  const spending=months.map(mk=>(APP.transactions||[]).filter(t=>t.month===mk).reduce((s,t)=>s+t.amount,0));
  const budgets=months.map(mk=>(APP.budgets||{})[mk]||null);
  const hasBudget=budgets.some(b=>b!==null);
  const sym = getCurrency().symbol;
  const tc='rgba(0,0,0,0.30)',gc='rgba(0,0,0,0.05)';
  const ds=[{label:'Spending',data:spending,borderColor:'#D85A30',backgroundColor:'rgba(216,90,48,0.07)',tension:0.38,fill:true,pointBackgroundColor:'#D85A30',pointRadius:4,pointHoverRadius:6,borderWidth:2}];
  if(hasBudget) ds.push({label:'Budget',data:budgets,borderColor:'rgba(55,138,221,0.55)',borderDash:[5,4],tension:0,fill:false,pointRadius:3,pointBackgroundColor:'#378ADD',borderWidth:1.5,spanGaps:true});
  try{trendChart=new Chart(cv,{type:'line',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:true,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`  ${c.dataset.label}: ${sym}${c.parsed.y.toFixed(2)}`}}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:13}}},y:{grid:{color:gc},ticks:{color:tc,font:{size:13},callback:v=>`${sym}${v}`},beginAtZero:true}}}});}catch(e){}
  const leg=document.getElementById('trend-leg');
  if(leg) leg.innerHTML=`<div style="display:flex;gap:20px;justify-content:center;font-size:14px;color:var(--text2)">
    <div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:2px;background:#D85A30;border-radius:1px"></div>Spending</div>
    ${hasBudget?`<div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:0;border-top:2px dashed rgba(55,138,221,0.65)"></div>Budget</div>`:''}
  </div><p style="text-align:center;font-size:13px;color:var(--text3);margin-top:6px">Last 6 months</p>`;}

// ── Render ────────────────────────────────────────────────────
function render(){
  const[yr,mo]=STATE.curMonth.split('-').map(Number);
  const txs=(APP.transactions||[]).filter(t=>t.month===STATE.curMonth).sort((a,b)=>b.ts-a.ts);
  const spent=txs.reduce((s,t)=>s+t.amount,0);
  const budget=(APP.budgets||{})[STATE.curMonth]||0;
  const left=budget-spent;
  const pct=budget>0?Math.min(100,spent/budget*100):0;
  const bc=left<0?'var(--danger)':pct>80?'#BA7517':'#1D9E75';
  const tokenOk = !!(SYNC.token && SYNC.expiry > Date.now());
  const connected = !!(tokenOk && SYNC.fileId);
  const expired   = !!(SYNC.fileId && !tokenOk);
  let inner='';
  if(STATE.modal==='setup')               inner=mSetup();
  else if(STATE.modal==='calc')           inner=mCalc();
  else if(STATE.modal==='cat')            inner=mCat();
  else if(STATE.modal==='notes')          inner=mNotes();
  else if(STATE.modal==='date')           inner=mDate();
  else if(STATE.modal==='budget')         inner=mBudget();
  else if(STATE.modal==='view'&&STATE.viewTx) inner=mView();
  else if(STATE.modal==='data')           inner=mData();
  const modalHtml=inner?`<div class="modal-overlay" onclick="closeModal()"><div class="modal-card" onclick="event.stopPropagation()">${inner}</div></div>`:'';
  const tabs=[['tx','Transactions'],['chart','Breakdown'],['history','History'],['trends','Trends']];
  let tc='';
  if(STATE.tab==='tx')        tc=tTx(txs);
  else if(STATE.tab==='chart')    tc=tChart(txs);
  else if(STATE.tab==='history')  tc=tHistory();
  else if(STATE.tab==='trends')   tc=tTrends();

  document.getElementById('app').innerHTML=`
  <div style="position:relative;min-height:100vh;${STATE.modal?'height:100vh;overflow:hidden':''}">
    <div style="padding:max(env(safe-area-inset-top),24px) 20px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div>
          <div class="serif" style="font-size:30px;font-weight:400;line-height:1;color:var(--text)">Finch</div>
          <div style="font-size:12px;color:var(--text3);margin-top:2px;letter-spacing:0.9px;text-transform:uppercase">Personal Finance</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="mth-btn" onclick="navMonth(-1)">&lsaquo;</button>
          <span style="font-size:14px;font-weight:500;min-width:108px;text-align:center;color:var(--text)">${MONTHS[mo-1]} ${yr}</span>
          <button class="mth-btn" onclick="navMonth(1)">&rsaquo;</button>
          <button class="icon-btn" onclick="setState({modal:'data',dataMsg:''})">&#9881;</button>
        </div>
      </div>
      <div id="sync-row" style="display:flex;align-items:center;gap:4px;min-height:22px;margin-bottom:14px">
        ${connected
          ?`<span class="sync-dot" style="background:#1D9E75"></span><span style="font-size:12px;color:var(--text2)">Google Drive synced</span>`
          :expired
          ?`<span class="sync-dot" style="background:#BA7517"></span><span style="font-size:12px;color:var(--text2);text-decoration:underline;text-underline-offset:2px;cursor:pointer" onclick="reconnectGoogle()">Drive session expired &mdash; tap to reconnect</span>`
          :`<span style="font-size:12px;color:var(--text3);text-decoration:underline;text-underline-offset:2px;cursor:pointer" onclick="setState({modal:'setup',setupError:'',setupLoading:false})">Connect Google Drive to back up your data &rarr;</span>`}
      </div>
      <div style="background:var(--bg2);border-radius:14px;padding:18px;margin-bottom:14px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;${budget>0?'margin-bottom:14px':''}">
          <div style="text-align:center">
            <div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Spent</div>
            <div class="serif" style="font-size:22px;font-weight:300">${fmtAmt(spent)}</div>
          </div>
          <div style="text-align:center;border-left:0.5px solid rgba(0,0,0,0.10);border-right:0.5px solid rgba(0,0,0,0.10)">
            <div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Budget</div>
            <button onclick="STATE.budgetInput='${budget||''}';setState({modal:'budget'})" class="serif" style="font-size:22px;font-weight:300;color:${budget?'var(--text)':'var(--text3)'};background:none;border:none;padding:0;cursor:pointer">
              ${budget?fmtAmt(budget):'Set &rarr;'}
            </button>
          </div>
          <div style="text-align:center">
            <div style="font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Left</div>
            <div class="serif" style="font-size:22px;font-weight:300;color:${left<0?'var(--danger)':'var(--text)'}">${left<0?'&minus;':''}${fmtAmt(left)}</div>
          </div>
        </div>
        ${budget>0?`
        <div style="background:var(--border);border-radius:999px;height:5px;overflow:hidden">
          <div class="bar-fill" style="height:100%;border-radius:999px;width:${pct.toFixed(1)}%;background:${bc}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:5px">
          <span style="font-size:12px;color:var(--text3)">${pct.toFixed(0)}% used</span>
          <span style="font-size:12px;color:${left<0?'var(--danger)':'var(--text3)'}">${left<0?'over budget by '+fmtAmt(-left):''}</span>
        </div>`:''}
      </div>
      <div class="tab-bar">
        ${tabs.map(([k,l])=>`<button class="tab-btn ${STATE.tab===k?'active':''}" onclick="setState({tab:'${k}'})">${l}</button>`).join('')}
      </div>
    </div>
    <div style="padding:0 20px 100px">${tc}</div>
    ${STATE.modal?'':`<button class="add-fab" onclick="setState({modal:'calc',calcExpr:'',calcDisp:'0'})">+</button>`}
    ${modalHtml}
  </div>`;

  if(STATE.modal==='budget'){const el=document.getElementById('bud-in');if(el){el.focus();el.select();}}
  if(STATE.modal==='notes'){setTimeout(()=>{const el=document.getElementById('note-in');if(el)el.focus();},80);}
  if(STATE.tab==='trends'){setTimeout(initTrend,80);}
}

// ── PWA install prompt ────────────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(ls.get('finch_banner')!=='0'){
    const b=document.getElementById('install-banner');if(b)b.style.display='flex';
  }
});
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  if(outcome==='accepted')ls.set('finch_banner','0');
  deferredPrompt=null;
  const b=document.getElementById('install-banner');if(b)b.style.display='none';
});
document.getElementById('banner-later').addEventListener('click',()=>{
  ls.set('finch_banner','0');
  const b=document.getElementById('install-banner');if(b)b.style.display='none';
});

// ── Boot ──────────────────────────────────────────────────────
async function boot(){
  applyTheme();
  applyFontScale();
  const saved=ls.get('finch_v2');
  if(saved){try{APP=JSON.parse(saved);}catch(e){}}
  // Try to load from Drive if we have a valid token
  if(SYNC.token && SYNC.fileId && SYNC.expiry > Date.now()){
    try{ await driveLoad(); SYNC.status='synced'; }catch(e){ SYNC.status='error'; }
  }
  render();
}
boot();
</script>
