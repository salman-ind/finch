<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Finch">
<title>Finch</title>
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Finch%20Finance%22,%22short_name%22:%22Finch%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%23ffffff%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20100%20100'%3E%3Crect%20width='100'%20height='100'%20rx='22'%20fill='%231a1a1a'/%3E%3Ctext%20y='.9em'%20font-size='72'%20x='12'%3E%F0%9F%90%A6%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ── Forced light theme ─────────────────────────────────────── */
:root {
  color-scheme: light;
  --bg:      #ffffff;
  --bg2:     #f5f4f0;
  --bg3:     #eceae4;
  --text:    #1a1a1a;
  --text2:   #6b6b68;
  --text3:   #a8a8a4;
  --border:  rgba(0,0,0,0.10);
  --border2: rgba(0,0,0,0.20);
  --danger:     #c0392b;
  --danger-bg:  #fdf0ef;
  --danger-bdr: rgba(192,57,43,0.28);
  --radius:    10px;
  --radius-lg: 14px;
}
*  { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #ffffff; color: #1a1a1a; }
body {
  font-family: 'DM Sans', sans-serif;
  -webkit-text-size-adjust: 100%;
  min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity 0.1s, transform 0.1s; }
button:active { opacity: 0.65; transform: scale(0.97); }
input  { font-family: inherit; -webkit-appearance: none; background: transparent; color: #1a1a1a; }
.serif { font-family: 'Playfair Display', serif; }
#app   { max-width: 440px; margin: 0 auto; min-height: 100vh; position: relative; }

.tab-bar { display: flex; border-bottom: 0.5px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn { padding: 10px 13px; background: none; border: none; border-bottom: 2px solid transparent; font-size: 12px; font-weight: 400; color: var(--text2); white-space: nowrap; margin-bottom: -0.5px; }
.tab-btn.active { font-weight: 500; color: var(--text); border-bottom-color: var(--text); }

.tx-row { display: flex; align-items: center; gap: 12px; padding: 10px 11px; border-radius: var(--radius); cursor: pointer; transition: background 0.1s; margin-bottom: 2px; }
.tx-row:hover, .tx-row:active { background: var(--bg2); }

.mth-btn { width: 32px; height: 32px; border-radius: 50%; border: 0.5px solid var(--border2); background: none; font-size: 16px; color: var(--text2); display: flex; align-items: center; justify-content: center; }
.add-fab { width: 44px; height: 44px; border-radius: 50%; background: var(--text); color: var(--bg); border: none; font-size: 28px; display: flex; align-items: center; justify-content: center; line-height: 1; flex-shrink: 0; box-shadow: 0 2px 14px rgba(0,0,0,0.16); }
.icon-btn { width: 32px; height: 32px; border-radius: 50%; border: 0.5px solid var(--border2); background: none; font-size: 16px; color: var(--text2); display: flex; align-items: center; justify-content: center; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.40); display: flex; align-items: flex-end; justify-content: center; z-index: 200; animation: fadeIn 0.15s ease; }
.modal-card { background: #ffffff; border-radius: 20px 20px 0 0; padding: 22px 20px 40px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.22s ease; }
@keyframes fadeIn  { from { opacity: 0 }                         to { opacity: 1 } }
@keyframes slideUp { from { transform: translateY(22px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }

.calc-btn { padding: 16px 0; font-size: 18px; border-radius: var(--radius); border: 0.5px solid var(--border); width: 100%; font-weight: 400; background: #ffffff; color: #1a1a1a; }
.cat-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 6px; border-radius: 12px; width: 100%; transition: transform 0.1s; }
.cat-btn:active { transform: scale(0.95); }
.bar-fill { transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.hist-card { background: var(--bg2); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: background 0.1s; }
.hist-card:active { background: var(--bg3); }
.primary-btn   { padding: 13px; border-radius: var(--radius); border: none; background: #1a1a1a; color: #ffffff; font-size: 14px; font-weight: 500; width: 100%; }
.secondary-btn { padding: 13px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: none; color: var(--text2); font-size: 14px; width: 100%; }
.del-btn { width: 100%; padding: 13px; border-radius: var(--radius); border: 0.5px solid var(--danger-bdr); background: var(--danger-bg); color: var(--danger); font-size: 14px; font-weight: 500; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; flex-shrink: 0; }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.28 } }
.syncing { animation: pulse 1s infinite; }

#install-banner {
  display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 440px;
  background: #1a1a1a; color: #ffffff;
  padding: 14px 20px max(env(safe-area-inset-bottom),20px);
  z-index: 300; animation: slideUp 0.25s ease;
  flex-direction: row; justify-content: space-between; align-items: center; gap: 14px;
}
</style>
</head>
<body>
<div id="app"></div>
<div id="install-banner">
  <div>
    <div style="font-weight:500;font-size:14px;margin-bottom:2px">Add Finch to home screen</div>
    <div style="font-size:12px;opacity:0.6">Use it like a native app, no browser bar</div>
  </div>
  <div style="display:flex;gap:8px;flex-shrink:0">
    <button id="banner-later" style="padding:8px 14px;border-radius:8px;border:0.5px solid rgba(255,255,255,0.28);background:transparent;color:#ffffff;font-size:13px;font-family:inherit">Later</button>
    <button id="install-btn"  style="padding:8px 14px;border-radius:8px;border:none;background:#ffffff;color:#1a1a1a;font-size:13px;font-weight:500;font-family:inherit">Install</button>
  </div>
</div>

<script>
// ── Emoji as JS unicode escapes (encoding-safe) ───────────────
const EM = {
  food:'\uD83C\uDF7D', health:'\uD83D\uDC8A', utilities:'\u26A1',
  entertainment:'\uD83C\uDFAC', house:'\uD83C\uDFE0', transport:'\uD83D\uDE97',
  gifts:'\uD83C\uDF81', clothing:'\uD83D\uDC55', misc:'\uD83D\uDCE6',
  receipt:'\uD83E\uDDFE', note:'\uD83D\uDCDD',
};
const CATS = [
  {id:'food',         label:'Food',       color:'#D85A30', bg:'rgba(216,90,48,0.11)'},
  {id:'health',       label:'Health',     color:'#1D9E75', bg:'rgba(29,158,117,0.11)'},
  {id:'utilities',    label:'Utilities',  color:'#378ADD', bg:'rgba(55,138,221,0.11)'},
  {id:'entertainment',label:'Entertain.', color:'#D4537E', bg:'rgba(212,83,126,0.11)'},
  {id:'house',        label:'House',      color:'#BA7517', bg:'rgba(186,117,23,0.11)'},
  {id:'transport',    label:'Transport',  color:'#7F77DD', bg:'rgba(127,119,221,0.11)'},
  {id:'gifts',        label:'Gifts',      color:'#E24B4A', bg:'rgba(226,75,74,0.11)'},
  {id:'clothing',     label:'Clothing',   color:'#639922', bg:'rgba(99,153,34,0.11)'},
  {id:'misc',         label:'Misc',       color:'#888780', bg:'rgba(136,135,128,0.11)'},
];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const mkKey  = d  => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const fmtAmt = n  => '\u20AC' + Math.abs(n).toFixed(2);
const getCat = id => CATS.find(c=>c.id===id)||CATS[8];
const esc    = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
const mlabel = k  => { const [yr,mo]=k.split('-').map(Number); return `${MONTHS[mo-1]} ${yr}`; };
const ls     = { get:k=>{try{return localStorage.getItem(k)}catch(e){return null}}, set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}} };
const em     = id => EM[id]||EM.misc;

let APP   = {budgets:{},transactions:[]};
let SYNC  = {token:ls.get('finch_gh_token')||'',gistId:ls.get('finch_gh_gist')||'',status:'idle',lastSaved:null};
let STATE = {
  curMonth:mkKey(new Date()),modal:null,
  amount:null,pendingCat:null,noteInput:'',
  viewTx:null,tab:'tx',
  budgetInput:'',calcExpr:'',calcDisp:'0',
  tokenInput:'',setupError:'',setupLoading:false,dataMsg:'',
};
let trendChart=null;

// ── GitHub Gist ───────────────────────────────────────────────
const GH='https://api.github.com',GDESC='Finch Finance Data',GFILE='finch-data.json';
const ghH=()=>({'Authorization':`Bearer ${SYNC.token}`,'Content-Type':'application/json','Accept':'application/vnd.github+json'});
async function ghFind(){
  let page=1;
  while(true){
    const r=await fetch(`${GH}/gists?per_page=100&page=${page}`,{headers:ghH()});
    if(!r.ok) throw new Error('Token invalid or missing gist scope.');
    const list=await r.json();
    const found=list.find(g=>g.description===GDESC);
    if(found) return found.id;
    if(list.length<100) return null;
    page++;
  }
}
async function ghCreate(){
  const r=await fetch(`${GH}/gists`,{method:'POST',headers:ghH(),body:JSON.stringify({description:GDESC,public:false,files:{[GFILE]:{content:JSON.stringify(APP)}}})});
  if(!r.ok) throw new Error('Failed to create gist.');
  return (await r.json()).id;
}
async function ghLoad(){
  const r=await fetch(`${GH}/gists/${SYNC.gistId}`,{headers:ghH()});
  if(!r.ok) throw new Error('Failed to load.');
  const raw=(await r.json()).files?.[GFILE]?.content;
  if(raw){try{APP=JSON.parse(raw);}catch(e){}}
}
async function ghSave(){
  SYNC.status='syncing';updateSyncDot();
  try{
    await fetch(`${GH}/gists/${SYNC.gistId}`,{method:'PATCH',headers:ghH(),body:JSON.stringify({files:{[GFILE]:{content:JSON.stringify(APP)}}})});
    SYNC.status='synced';SYNC.lastSaved=new Date();
  }catch(e){SYNC.status='error';}
  updateSyncDot();
}
function updateSyncDot(){
  const el=document.getElementById('sync-row');if(!el)return;
  if(SYNC.status==='syncing') el.innerHTML=`<span class="sync-dot syncing" style="background:#BA7517"></span><span style="font-size:10px;color:#6b6b68">Syncing&hellip;</span>`;
  else if(SYNC.status==='synced') el.innerHTML=`<span class="sync-dot" style="background:#1D9E75"></span><span style="font-size:10px;color:#6b6b68">Saved to GitHub</span>`;
  else if(SYNC.status==='error') el.innerHTML=`<span class="sync-dot" style="background:#E24B4A"></span><span style="font-size:10px;color:#c0392b">Sync failed</span>`;
}
async function saveData(){
  try{ls.set('finch_v2',JSON.stringify(APP));}catch(e){}
  if(SYNC.token&&SYNC.gistId) ghSave();
}
async function connectGitHub(){
  const tok=STATE.tokenInput.trim();
  if(!tok){setState({setupError:'Please paste your token.'});return;}
  setState({setupLoading:true,setupError:''});SYNC.token=tok;
  try{
    let gid=await ghFind();
    if(gid){SYNC.gistId=gid;ls.set('finch_gh_gist',gid);await ghLoad();}
    else{gid=await ghCreate();SYNC.gistId=gid;ls.set('finch_gh_gist',gid);}
    ls.set('finch_gh_token',tok);SYNC.status='synced';
    setState({setupLoading:false,modal:null,tokenInput:'',setupError:''});
  }catch(err){setState({setupLoading:false,setupError:err.message||'Connection failed.'});}
}
async function disconnectGitHub(){
  ls.set('finch_gh_token','');ls.set('finch_gh_gist','');
  SYNC.token='';SYNC.gistId='';SYNC.status='idle';
  setState({modal:'data',dataMsg:'Disconnected from GitHub.'});
}
async function forceSync(){
  if(!SYNC.token||!SYNC.gistId){setState({dataMsg:'Not connected.'});return;}
  setState({dataMsg:'Syncing\u2026'});await ghSave();
  setState({dataMsg:'Synced!'});setTimeout(()=>setState({dataMsg:''}),2000);
}

// ── State helpers ─────────────────────────────────────────────
function setState(p){Object.assign(STATE,p);render();}
function closeModal(){setState({modal:null,viewTx:null,pendingCat:null,noteInput:'',dataMsg:''});}

function calcPress(v){
  const ops=['+','-','*','/'];let e=STATE.calcExpr;
  if(v==='C'){setState({calcExpr:'',calcDisp:'0'});return;}
  if(v==='DEL'){const ne=e.slice(0,-1);setState({calcExpr:ne,calcDisp:ne||'0'});return;}
  if(v==='='){
    try{const r=Function('"use strict";return('+e+')')();if(!isNaN(r)&&isFinite(r)){const rv=Math.round(r*100)/100;setState({calcExpr:String(rv),calcDisp:String(rv)});}}catch(ex){}return;
  }
  if(ops.includes(v)){if(!e)return;const ne=ops.includes(e.slice(-1))?e.slice(0,-1)+v:e+v;setState({calcExpr:ne,calcDisp:ne});return;}
  if(v==='.'){const pts=e.split(/[+\-*/]/);if(pts[pts.length-1].includes('.'))return;}
  setState({calcExpr:e+v,calcDisp:e+v});
}
function calcOk(){
  let v;try{v=Function('"use strict";return('+STATE.calcExpr+')')();}catch(ex){v=parseFloat(STATE.calcDisp);}
  if(!isNaN(v)&&isFinite(v)&&v>0) setState({amount:Math.round(v*100)/100,modal:'cat',calcExpr:'',calcDisp:'0'});
}
function pickCat(id){setState({pendingCat:id,modal:'notes',noteInput:''});}
async function addTx(){
  const now=new Date();
  APP.transactions.push({id:String(Date.now()),amount:STATE.amount,category:STATE.pendingCat,date:now.toISOString().split('T')[0],month:mkKey(now),ts:Date.now(),note:STATE.noteInput.trim()});
  await saveData();setState({modal:null,amount:null,pendingCat:null,noteInput:'',curMonth:mkKey(now),tab:'tx'});
}
async function delTx(id){
  APP.transactions=APP.transactions.filter(t=>t.id!==id);
  await saveData();setState({modal:null,viewTx:null});
}
async function setBudget(){
  const v=parseFloat(STATE.budgetInput);if(isNaN(v)||v<=0)return;
  APP.budgets[STATE.curMonth]=v;await saveData();setState({modal:null,budgetInput:''});
}
function navMonth(d){const[yr,mo]=STATE.curMonth.split('-').map(Number);setState({curMonth:mkKey(new Date(yr,mo-1+d,1)),tab:'tx'});}
function goToMonth(k){setState({curMonth:k,tab:'tx',modal:null});}
function getAllMonths(){const s=new Set();(APP.transactions||[]).forEach(t=>s.add(t.month));Object.keys(APP.budgets||{}).forEach(k=>s.add(k));return Array.from(s).sort().reverse();}

// ── Modals ────────────────────────────────────────────────────
function mSetup(){return`
  <div style="text-align:center;margin-bottom:22px">
    <div class="serif" style="font-size:28px;font-weight:300;margin-bottom:5px">Connect GitHub</div>
    <div style="font-size:13px;color:#6b6b68">Back up your data to a private GitHub Gist</div>
  </div>
  <div style="background:#f5f4f0;border-radius:12px;padding:14px 16px;margin-bottom:18px;font-size:13px;color:#6b6b68;line-height:1.8">
    <strong style="font-weight:500;color:#1a1a1a">Get your token:</strong><br>
    1. GitHub &rarr; Settings &rarr; Developer settings<br>
    2. Personal access tokens &rarr; Tokens (classic)<br>
    3. Generate new token &rarr; tick <code style="background:#eceae4;padding:1px 6px;border-radius:4px;font-size:11px">gist</code> scope only<br>
    4. Copy &amp; paste below
  </div>
  <input id="tok-in" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" oninput="STATE.tokenInput=this.value" onkeydown="if(event.key==='Enter')connectGitHub()"
    style="width:100%;padding:12px 14px;border:0.5px solid rgba(0,0,0,0.2);border-radius:10px;font-size:14px;font-family:monospace;outline:none;margin-bottom:10px">
  ${STATE.setupError?`<div style="color:#c0392b;font-size:13px;margin-bottom:10px;padding:10px 12px;background:#fdf0ef;border-radius:8px">${esc(STATE.setupError)}</div>`:''}
  <button class="primary-btn" onclick="connectGitHub()" ${STATE.setupLoading?'disabled':''} style="${STATE.setupLoading?'opacity:0.6':''}">
    ${STATE.setupLoading?'Connecting&hellip;':'Connect to GitHub &rarr;'}
  </button>
  <button onclick="closeModal()" style="width:100%;padding:10px;background:none;border:none;color:#a8a8a4;font-size:13px;margin-top:6px;font-family:inherit">Skip for now</button>`;}

function mCalc(){
  const grid=[
    [{l:'C',v:'C',fg:'#D85A30',bg:'rgba(216,90,48,0.1)'},{l:'DEL',v:'DEL',bg:'#f5f4f0',sz:'13px'},{l:'&divide;',v:'/',fg:'#378ADD',bg:'#f5f4f0'},{l:'&times;',v:'*',fg:'#378ADD',bg:'#f5f4f0'}],
    [{l:'7',v:'7'},{l:'8',v:'8'},{l:'9',v:'9'},{l:'&minus;',v:'-',fg:'#378ADD',bg:'#f5f4f0'}],
    [{l:'4',v:'4'},{l:'5',v:'5'},{l:'6',v:'6'},{l:'+',v:'+',fg:'#378ADD',bg:'#f5f4f0'}],
    [{l:'1',v:'1'},{l:'2',v:'2'},{l:'3',v:'3'},{l:'.',v:'.'}],
  ];
  return`<h2 class="serif" style="font-size:20px;font-weight:400;margin-bottom:14px">Add expense</h2>
  <div style="background:#f5f4f0;border-radius:10px;padding:14px 16px;margin-bottom:12px;text-align:right;min-height:60px;display:flex;align-items:center;justify-content:flex-end">
    <span class="serif" style="font-size:32px;font-weight:300;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${STATE.calcDisp}</span>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:7px">
    ${grid.map(r=>r.map(b=>`<button class="calc-btn" style="background:${b.bg||'#ffffff'};color:${b.fg||'#1a1a1a'};font-size:${b.sz||'18px'}" onclick="calcPress('${b.v}')">${b.l}</button>`).join('')).join('')}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px">
    <button class="calc-btn" onclick="calcPress('0')">0</button>
    <button class="calc-btn" style="background:rgba(55,138,221,0.1);color:#378ADD" onclick="calcPress('=')">=</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <button class="secondary-btn" onclick="closeModal()">Cancel</button>
    <button class="primary-btn" onclick="calcOk()">OK</button>
  </div>`;}

function mCat(){return`
  <h2 class="serif" style="font-size:20px;font-weight:400;margin-bottom:4px">Category</h2>
  <p style="font-size:13px;color:#6b6b68;margin-bottom:16px">for <span class="serif" style="font-size:17px;font-weight:300">${fmtAmt(STATE.amount)}</span></p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
    ${CATS.map(c=>`<button class="cat-btn" onclick="pickCat('${c.id}')" style="border:0.5px solid ${c.color}45;background:${c.bg}">
      <span style="font-size:24px">${em(c.id)}</span>
      <span style="font-size:11px;font-weight:500;color:${c.color}">${c.label}</span>
    </button>`).join('')}
  </div>
  <button onclick="setState({modal:'calc'})" style="margin-top:12px;width:100%;padding:8px;background:none;border:none;color:#a8a8a4;font-size:13px;font-family:inherit">&larr; back</button>`;}

function mNotes(){
  const cat=getCat(STATE.pendingCat);
  return`<h2 class="serif" style="font-size:20px;font-weight:400;margin-bottom:16px">Add a note <span style="color:#a8a8a4;font-size:14px;font-weight:300">&mdash; optional</span></h2>
  <div style="display:flex;align-items:center;gap:14px;padding:16px;background:${cat.bg};border-radius:12px;margin-bottom:16px">
    <span style="font-size:34px">${em(cat.id)}</span>
    <div>
      <div style="font-size:11px;color:${cat.color};font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">${cat.label}</div>
      <div class="serif" style="font-size:26px;font-weight:300">${fmtAmt(STATE.amount)}</div>
    </div>
  </div>
  <input id="note-in" type="text" placeholder="What was this for?" value="${esc(STATE.noteInput)}" oninput="STATE.noteInput=this.value" maxlength="60" onkeydown="if(event.key==='Enter')addTx()"
    style="width:100%;padding:12px 14px;border:0.5px solid rgba(0,0,0,0.2);border-radius:10px;font-size:15px;outline:none;margin-bottom:14px">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <button class="secondary-btn" onclick="STATE.noteInput='';addTx()">Skip</button>
    <button class="primary-btn" onclick="addTx()">Save</button>
  </div>`;}

function mBudget(){
  const[yr,mo]=STATE.curMonth.split('-').map(Number);
  return`<h2 class="serif" style="font-size:20px;font-weight:400;margin-bottom:4px">Set budget</h2>
  <p style="font-size:13px;color:#6b6b68;margin-bottom:18px">${MONTHS[mo-1]} ${yr}</p>
  <div style="display:flex;align-items:baseline;gap:8px;border-bottom:0.5px solid rgba(0,0,0,0.2);padding-bottom:8px;margin-bottom:22px">
    <span class="serif" style="font-size:26px;color:#a8a8a4">&euro;</span>
    <input id="bud-in" type="number" inputmode="decimal" value="${STATE.budgetInput}" placeholder="0.00" oninput="STATE.budgetInput=this.value" onkeydown="if(event.key==='Enter')setBudget()"
      style="flex:1;font-size:28px;font-family:'Playfair Display',serif;font-weight:300;border:none;outline:none">
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
    <button class="secondary-btn" onclick="closeModal()">Cancel</button>
    <button class="primary-btn" onclick="setBudget()">Save</button>
  </div>`;}

function mView(){
  const tx=STATE.viewTx,cat=getCat(tx.category);
  const ds=new Date(tx.date+'T12:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return`<h2 class="serif" style="font-size:20px;font-weight:400;margin-bottom:18px">Transaction</h2>
  <div style="display:flex;align-items:center;gap:16px;padding:18px;background:${cat.bg};border-radius:${tx.note?'12px 12px 0 0':'12px'};margin-bottom:${tx.note?'0':'18px'}">
    <span style="font-size:36px">${em(cat.id)}</span>
    <div>
      <div style="font-size:11px;color:${cat.color};font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">${cat.label}</div>
      <div class="serif" style="font-size:30px;font-weight:300">${fmtAmt(tx.amount)}</div>
      <div style="font-size:12px;color:#a8a8a4;margin-top:4px">${ds}</div>
    </div>
  </div>
  ${tx.note?`<div style="padding:12px 16px;border:0.5px solid ${cat.color}30;border-top:none;border-radius:0 0 12px 12px;margin-bottom:18px;font-size:13px;color:#6b6b68">${EM.note} ${esc(tx.note)}</div>`:'<div style="margin-bottom:18px"></div>'}
  <button class="del-btn" onclick="delTx('${tx.id}')">Delete transaction</button>`;}

function mData(){
  const tc=(APP.transactions||[]).length,mc=Object.keys(APP.budgets||{}).length;
  const connected=!!(SYNC.token&&SYNC.gistId);
  const lastSaved=SYNC.lastSaved?SYNC.lastSaved.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):null;
  return`<h2 class="serif" style="font-size:20px;font-weight:400;margin-bottom:18px">Data &amp; Sync</h2>
  <div style="background:${connected?'rgba(29,158,117,0.08)':'#f5f4f0'};border-radius:12px;padding:14px 16px;margin-bottom:14px;border:0.5px solid ${connected?'rgba(29,158,117,0.28)':'rgba(0,0,0,0.10)'}">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span class="sync-dot" style="background:${connected?'#1D9E75':'#888780'}"></span>
      <span style="font-size:13px;font-weight:500">${connected?'Connected to GitHub Gist':'Local only'}</span>
    </div>
    <div style="font-size:12px;color:#a8a8a4">${connected?`Private gist &middot; ${tc} transactions &middot; ${mc} budgets${lastSaved?' &middot; last saved '+lastSaved:''}`:(`${tc} transaction${tc!==1?'s':''} stored locally`)}</div>
  </div>
  ${STATE.dataMsg?`<div style="font-size:13px;color:#6b6b68;margin-bottom:12px;padding:10px 12px;background:#f5f4f0;border-radius:8px">${esc(STATE.dataMsg)}</div>`:''}
  ${connected?`
    <button onclick="forceSync()" style="width:100%;padding:12px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.2);background:none;font-size:14px;color:#1a1a1a;margin-bottom:8px">Force sync now</button>
    <button onclick="disconnectGitHub()" style="width:100%;padding:12px;border-radius:10px;border:0.5px solid rgba(192,57,43,0.28);background:#fdf0ef;color:#c0392b;font-size:14px;margin-bottom:8px">Disconnect GitHub</button>
  `:`<button onclick="setState({modal:'setup',tokenInput:'',setupError:'',setupLoading:false})" class="primary-btn" style="margin-bottom:8px">Connect to GitHub &rarr;</button>`}
  <button onclick="closeModal()" style="width:100%;padding:10px;background:none;border:none;color:#a8a8a4;font-size:13px;font-family:inherit">Done</button>`;}

// ── Tabs ──────────────────────────────────────────────────────
function tTx(txs){
  if(!txs.length) return`<div style="text-align:center;padding:64px 20px;color:#a8a8a4">
    <div style="font-size:42px;margin-bottom:12px;opacity:0.28">${EM.receipt}</div>
    <p class="serif" style="font-size:18px;font-weight:300;margin-bottom:5px">No transactions yet</p>
    <p style="font-size:13px">Tap + to add your first expense</p>
  </div>`;
  let html='',prev='';
  txs.forEach(tx=>{
    const cat=getCat(tx.category);
    if(tx.date!==prev){
      const ds=new Date(tx.date+'T12:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
      html+=`<div style="font-size:11px;color:#a8a8a4;text-transform:uppercase;letter-spacing:0.5px;padding:14px 0 5px;font-weight:500">${ds}</div>`;
      prev=tx.date;
    }
    html+=`<div class="tx-row" onclick="STATE.viewTx=APP.transactions.find(t=>t.id==='${tx.id}');setState({modal:'view'})">
      <div style="width:42px;height:42px;border-radius:10px;background:${cat.bg};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${em(cat.id)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:500">${cat.label}</div>
        ${tx.note?`<div style="font-size:11px;color:#a8a8a4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(tx.note)}</div>`:''}
      </div>
      <div class="serif" style="font-size:17px;font-weight:300;flex-shrink:0">&minus;${fmtAmt(tx.amount)}</div>
    </div>`;
  });
  return html;
}

function tChart(txs){
  const spent=txs.reduce((s,t)=>s+t.amount,0);
  const ct={};txs.forEach(t=>{ct[t.category]=(ct[t.category]||0)+t.amount;});
  const bd=CATS.filter(c=>ct[c.id]).map(c=>({...c,val:ct[c.id],pct:spent>0?ct[c.id]/spent*100:0})).sort((a,b)=>b.val-a.val);
  if(!bd.length) return`<div style="text-align:center;padding:64px 20px;color:#a8a8a4"><p class="serif" style="font-size:18px;font-weight:300">No data yet</p></div>`;
  return`<div style="padding-top:16px">
    ${bd.map(c=>`<div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:17px">${em(c.id)}</span><span style="font-size:13px;font-weight:500">${c.label}</span></div>
        <div><span class="serif" style="font-size:15px;font-weight:300">${fmtAmt(c.val)}</span><span style="font-size:11px;color:#a8a8a4;margin-left:4px">${c.pct.toFixed(0)}%</span></div>
      </div>
      <div style="background:#f5f4f0;border-radius:999px;height:7px;overflow:hidden">
        <div class="bar-fill" style="height:100%;border-radius:999px;width:${c.pct.toFixed(1)}%;background:${c.color}"></div>
      </div>
    </div>`).join('')}
    <div style="margin-top:10px;padding:13px 15px;background:#f5f4f0;border-radius:10px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:#6b6b68">Total this month</span>
      <span class="serif" style="font-size:18px;font-weight:300">${fmtAmt(spent)}</span>
    </div>
  </div>`;}

function tHistory(){
  const all=getAllMonths();
  if(!all.length) return`<div style="text-align:center;padding:64px 20px;color:#a8a8a4"><p class="serif" style="font-size:18px;font-weight:300">No history yet</p></div>`;
  return`<div style="padding-top:16px">${all.map(mk=>{
    const txs=(APP.transactions||[]).filter(t=>t.month===mk);
    const spent=txs.reduce((s,t)=>s+t.amount,0);
    const budget=(APP.budgets||{})[mk]||0;
    const pct=budget>0?Math.min(100,spent/budget*100):0;
    const isCur=mk===STATE.curMonth;
    const bc=budget>0&&spent>budget?'#E24B4A':pct>80?'#BA7517':'#1D9E75';
    return`<div class="hist-card" onclick="goToMonth('${mk}')" style="${isCur?'border:0.5px solid rgba(0,0,0,0.2);':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${budget?'10px':'0'}">
        <div>
          <div style="font-size:14px;font-weight:500">${mlabel(mk)}${isCur?` <span style="font-size:10px;color:#a8a8a4;background:#eceae4;padding:2px 7px;border-radius:99px">now</span>`:''}</div>
          <div style="font-size:11px;color:#a8a8a4;margin-top:2px">${txs.length} transaction${txs.length!==1?'s':''}</div>
        </div>
        <div style="text-align:right">
          <div class="serif" style="font-size:18px;font-weight:300">${fmtAmt(spent)}</div>
          ${budget?`<div style="font-size:11px;color:#a8a8a4">of ${fmtAmt(budget)}</div>`:''}
        </div>
      </div>
      ${budget?`<div style="background:rgba(0,0,0,0.08);border-radius:999px;height:4px;overflow:hidden"><div style="height:100%;border-radius:999px;width:${pct.toFixed(1)}%;background:${bc}"></div></div>`:''}
    </div>`;
  }).join('')}</div>`;}

function tTrends(){return`<div style="padding-top:16px"><canvas id="trend-c"></canvas><div id="trend-leg" style="margin-top:14px"></div></div>`;}
function initTrend(){
  const cv=document.getElementById('trend-c');
  if(!cv||typeof Chart==='undefined') return;
  if(trendChart){try{trendChart.destroy();}catch(e){}trendChart=null;}
  const months=(()=>{const r=[],n=new Date();for(let i=5;i>=0;i--)r.push(mkKey(new Date(n.getFullYear(),n.getMonth()-i,1)));return r;})();
  const labels=months.map(mk=>{const[yr,mo]=mk.split('-').map(Number);return MONTHS[mo-1].slice(0,3)+" '"+String(yr).slice(2);});
  const spending=months.map(mk=>(APP.transactions||[]).filter(t=>t.month===mk).reduce((s,t)=>s+t.amount,0));
  const budgets=months.map(mk=>(APP.budgets||{})[mk]||null);
  const hasBudget=budgets.some(b=>b!==null);
  const tc='rgba(0,0,0,0.30)',gc='rgba(0,0,0,0.05)';
  const ds=[{label:'Spending',data:spending,borderColor:'#D85A30',backgroundColor:'rgba(216,90,48,0.07)',tension:0.38,fill:true,pointBackgroundColor:'#D85A30',pointRadius:4,pointHoverRadius:6,borderWidth:2}];
  if(hasBudget) ds.push({label:'Budget',data:budgets,borderColor:'rgba(55,138,221,0.55)',borderDash:[5,4],tension:0,fill:false,pointRadius:3,pointBackgroundColor:'#378ADD',borderWidth:1.5,spanGaps:true});
  try{trendChart=new Chart(cv,{type:'line',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:true,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`  ${c.dataset.label}: \u20AC${c.parsed.y.toFixed(2)}`}}},scales:{x:{grid:{color:gc},ticks:{color:tc,font:{size:11}}},y:{grid:{color:gc},ticks:{color:tc,font:{size:11},callback:v=>`\u20AC${v}`},beginAtZero:true}}}});}catch(e){}
  const leg=document.getElementById('trend-leg');
  if(leg) leg.innerHTML=`<div style="display:flex;gap:20px;justify-content:center;font-size:12px;color:#6b6b68">
    <div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:2px;background:#D85A30;border-radius:1px"></div>Spending</div>
    ${hasBudget?`<div style="display:flex;align-items:center;gap:6px"><div style="width:16px;height:0;border-top:2px dashed rgba(55,138,221,0.65)"></div>Budget</div>`:''}
  </div><p style="text-align:center;font-size:11px;color:#a8a8a4;margin-top:6px">Last 6 months</p>`;}

// ── Render ────────────────────────────────────────────────────
function render(){
  const[yr,mo]=STATE.curMonth.split('-').map(Number);
  const txs=(APP.transactions||[]).filter(t=>t.month===STATE.curMonth).sort((a,b)=>b.ts-a.ts);
  const spent=txs.reduce((s,t)=>s+t.amount,0);
  const budget=(APP.budgets||{})[STATE.curMonth]||0;
  const left=budget-spent;
  const pct=budget>0?Math.min(100,spent/budget*100):0;
  const bc=left<0?'#c0392b':pct>80?'#BA7517':'#1D9E75';
  const connected=!!(SYNC.token&&SYNC.gistId);
  let inner='';
  if(STATE.modal==='setup')               inner=mSetup();
  else if(STATE.modal==='calc')           inner=mCalc();
  else if(STATE.modal==='cat')            inner=mCat();
  else if(STATE.modal==='notes')          inner=mNotes();
  else if(STATE.modal==='budget')         inner=mBudget();
  else if(STATE.modal==='view'&&STATE.viewTx) inner=mView();
  else if(STATE.modal==='data')           inner=mData();
  const modalHtml=inner?`<div class="modal-overlay" onclick="closeModal()"><div class="modal-card" onclick="event.stopPropagation()">${inner}</div></div>`:'';
  const tabs=[['tx','Transactions'],['chart','Breakdown'],['history','History'],['trends','Trends']];
  let tc='';
  if(STATE.tab==='tx')        tc=tTx(txs);
  else if(STATE.tab==='chart')    tc=tChart(txs);
  else if(STATE.tab==='history')  tc=tHistory();
  else if(STATE.tab==='trends')   tc=tTrends();

  document.getElementById('app').innerHTML=`
  <div style="position:relative;min-height:100vh;${STATE.modal?'height:100vh;overflow:hidden':''}">
    <div style="padding:max(env(safe-area-inset-top),24px) 20px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div>
          <div class="serif" style="font-size:28px;font-weight:400;line-height:1;color:#1a1a1a">Finch</div>
          <div style="font-size:10px;color:#a8a8a4;margin-top:2px;letter-spacing:0.9px;text-transform:uppercase">Personal Finance</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="mth-btn" onclick="navMonth(-1)">&lsaquo;</button>
          <span style="font-size:12px;font-weight:500;min-width:108px;text-align:center;color:#1a1a1a">${MONTHS[mo-1]} ${yr}</span>
          <button class="mth-btn" onclick="navMonth(1)">&rsaquo;</button>
          <button class="add-fab" onclick="setState({modal:'calc',calcExpr:'',calcDisp:'0'})">+</button>
          <button class="icon-btn" onclick="setState({modal:'data',dataMsg:''})">&#9881;</button>
        </div>
      </div>
      <div id="sync-row" style="display:flex;align-items:center;gap:4px;min-height:22px;margin-bottom:14px">
        ${connected
          ?`<span class="sync-dot" style="background:#1D9E75"></span><span style="font-size:10px;color:#6b6b68">GitHub synced</span>`
          :`<span style="font-size:10px;color:#a8a8a4;text-decoration:underline;text-underline-offset:2px;cursor:pointer" onclick="setState({modal:'setup',tokenInput:'',setupError:'',setupLoading:false})">Connect GitHub to back up your data &rarr;</span>`}
      </div>
      <div style="background:#f5f4f0;border-radius:14px;padding:18px;margin-bottom:14px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;${budget>0?'margin-bottom:14px':''}">
          <div style="text-align:center">
            <div style="font-size:10px;color:#a8a8a4;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Spent</div>
            <div class="serif" style="font-size:20px;font-weight:300">${fmtAmt(spent)}</div>
          </div>
          <div style="text-align:center;border-left:0.5px solid rgba(0,0,0,0.10);border-right:0.5px solid rgba(0,0,0,0.10)">
            <div style="font-size:10px;color:#a8a8a4;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Budget</div>
            <button onclick="STATE.budgetInput='${budget||''}';setState({modal:'budget'})" class="serif" style="font-size:20px;font-weight:300;color:${budget?'#1a1a1a':'#a8a8a4'};background:none;border:none;padding:0;cursor:pointer">
              ${budget?fmtAmt(budget):'Set &rarr;'}
            </button>
          </div>
          <div style="text-align:center">
            <div style="font-size:10px;color:#a8a8a4;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px">Left</div>
            <div class="serif" style="font-size:20px;font-weight:300;color:${left<0?'#c0392b':'#1a1a1a'}">${left<0?'&minus;':''}${fmtAmt(left)}</div>
          </div>
        </div>
        ${budget>0?`
        <div style="background:rgba(0,0,0,0.08);border-radius:999px;height:5px;overflow:hidden">
          <div class="bar-fill" style="height:100%;border-radius:999px;width:${pct.toFixed(1)}%;background:${bc}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:5px">
          <span style="font-size:10px;color:#a8a8a4">${pct.toFixed(0)}% used</span>
          <span style="font-size:10px;color:${left<0?'#c0392b':'#a8a8a4'}">${left<0?'over budget by '+fmtAmt(-left):''}</span>
        </div>`:''}
      </div>
      <div class="tab-bar">
        ${tabs.map(([k,l])=>`<button class="tab-btn ${STATE.tab===k?'active':''}" onclick="setState({tab:'${k}'})">${l}</button>`).join('')}
      </div>
    </div>
    <div style="padding:0 20px 80px">${tc}</div>
    ${modalHtml}
  </div>`;

  if(STATE.modal==='budget'){const el=document.getElementById('bud-in');if(el){el.focus();el.select();}}
  if(STATE.modal==='notes'){setTimeout(()=>{const el=document.getElementById('note-in');if(el)el.focus();},80);}
  if(STATE.modal==='setup'){setTimeout(()=>{const el=document.getElementById('tok-in');if(el)el.focus();},80);}
  if(STATE.tab==='trends'){setTimeout(initTrend,80);}
}

// ── PWA install prompt ────────────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(ls.get('finch_banner')!=='0'){
    const b=document.getElementById('install-banner');if(b)b.style.display='flex';
  }
});
document.getElementById('install-btn').addEventListener('click',async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  if(outcome==='accepted')ls.set('finch_banner','0');
  deferredPrompt=null;
  const b=document.getElementById('install-banner');if(b)b.style.display='none';
});
document.getElementById('banner-later').addEventListener('click',()=>{
  ls.set('finch_banner','0');
  const b=document.getElementById('install-banner');if(b)b.style.display='none';
});

// ── Boot ──────────────────────────────────────────────────────
async function boot(){
  const saved=ls.get('finch_v2');
  if(saved){try{APP=JSON.parse(saved);}catch(e){}}
  if(SYNC.token&&SYNC.gistId){try{await ghLoad();SYNC.status='synced';}catch(e){SYNC.status='error';}}
  render();
}
boot();
</script>
</body>
</html>
